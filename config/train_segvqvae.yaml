exp:
  name: 'seg_align_V3-1'
  seed: 42
  device: 'cuda:0'
  root_ckpt_dir: './checkpoint_dir'
  root_log_dir: './log'

data:
  name: 'humanml3d'
  root_dir: '/nas2/data/dpfla3573/code/MoScale/dataset/HumanML3D'
  dim_pose: 263
  max_n_seg: 8
  seg_jsonl_train: 'config/train.jsonl'
  seg_jsonl_val: 'config/val.jsonl'

model:
  motion_dim: 263
  latent_dim: 512
  down_t: 2           # 4x temporal downsample (196 → 49)
  stride_t: 2
  width: 512
  depth: 3
  dilation_growth_rate: 3
  clip_dim: 512       # openai/clip-vit-base-patch32 text dim
  clip_model: 'openai/clip-vit-base-patch32'
  nb_code: 512
  align_dim: 256

training:
  batch_size: 256
  num_epochs: 500
  stage1_epochs: 200        # train_seg_align.py (Stage 1) 학습 에폭 수
  stage1_ckpt_name: 'plugin_align_v3-1'   # 저장/로드할 Stage 1 체크포인트 파일 이름 (.tar 자동 부여)
  stage2_ckpt_name: 'plugin_vqdec_v3-3'    # Stage 2 체크포인트 파일 이름 접두사 (_best / _ep{N} 자동 부여)
  hrv_ckpt_path: './checkpoint_dir/humanml3d/hrvqvae/hrvqvae/model/net_best_fid.tar'  # HRVQVAE encoder/decoder plug-in (codebook은 residual 분포로 새로 학습)
  plugin_ckpt_path: './checkpoint_dir/humanml3d/seg_align_plugin/seg_align_V3-1/plugin_align_v3-1.tar'  # align_proj 로드 경로 (null이면 random init)
  plugin_ckpt_name: 'plugin_align_v3-1'       # train_seg_align_plugin.py 저장 이름
  plugin_epochs: 100                         # plugin alignment 학습 에폭 수
  lr: 2.0e-4
  lr_clip: 1.0e-5        # CLIP last 2 layer fine-tune LR
  weight_decay: 0.0
  lambda_commit: 0.02
  lambda_commit_hrv: 0.002
  lambda_align: 0.01
  log_every: 50
  save_every: 50
  val_every: 5
